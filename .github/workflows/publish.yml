name: Publish frr-sidecar image and chart
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/alexmkx/garuda-frr-sidecar
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v7
        with:
          context: image
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
  publish-chart:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'
      - name: Helm registry login
        run: |
          echo "${{ secrets.GHCR_PAT }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Package and push chart
        run: |
          set -euo pipefail
          helm package charts/frr-sidecar --destination /tmp/chart
          helm push /tmp/chart/frr-sidecar-*.tgz oci://ghcr.io/alexmkx/charts
